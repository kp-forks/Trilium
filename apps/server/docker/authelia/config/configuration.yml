# Minimal Authelia config for testing Trilium's OpenID Connect (OIDC) login.
#
# DEV ONLY — every secret in here is throwaway. Do not reuse for anything real.
#
# This config deliberately reproduces https://github.com/TriliumNext/Trilium/issues/6387:
# a spec-compliant provider only returns `name`/`email` from the UserInfo endpoint, NOT in
# the ID token. To test the Authelia-side workaround instead, uncomment the `claims_policies`
# block at the bottom and the `claims_policy:` line on the client.

theme: 'light'

server:
  address: 'tcp://0.0.0.0:9091'
  # Authelia 4.39 requires https for authelia_url, so the portal is served over TLS with a
  # self-signed cert for auth.example.com (see config/certs, regenerate via the README).
  tls:
    certificate: '/config/certs/public.crt'
    key: '/config/certs/private.key'

log:
  level: 'info'

# Required since 4.38; throwaway dev secret.
identity_validation:
  reset_password:
    jwt_secret: 'insecure_dev_jwt_secret_change_me_0123456789'

# Single test user. Password is "authelia" (the well-known Authelia example argon2id hash).
authentication_backend:
  file:
    path: '/config/users_database.yml'

access_control:
  default_policy: 'one_factor'

session:
  secret: 'fb4KB+NJHQ948f5Ell9S9H23HIQE06OgdsFeD9EPqb0xX7xWOZN0aB63hVRGVAxS'
  cookies:
    # The portal lives on a subdomain of this registrable domain. Authelia rejects a bare
    # `localhost` cookie domain (no dot), which is why we use auth.example.com + a hosts entry.
    - domain: 'example.com'
      authelia_url: 'https://auth.example.com:9091'

storage:
  encryption_key: 'w2uKzhx4Gt/aKYycoWGgQck+E/Onp8wCHqFYPTQL/xPSp6ZCSplsW8OEtWek5E50'
  local:
    path: '/data/db.sqlite3'

notifier:
  filesystem:
    # Authelia writes registration / reset emails here instead of sending them.
    filename: '/data/notification.txt'

identity_providers:
  oidc:
    hmac_secret: 'PrK2/+SmOG79R1WvgUUgm6RSkHEgs6wIk2jE30B/kdxhBFVyz4bzai7USyzseBkH'
