          -----END PRIVATE KEY-----
    clients:
      - client_id: 'trilium'
        client_name: 'Trilium'
        # DEV ONLY plaintext secret; matches TRILIUM_OAUTH_CLIENT_SECRET below.
        client_secret: '$plaintext$insecure_secret'
        public: false
        authorization_policy: 'one_factor'
        require_pkce: false
        redirect_uris:
          # Loopback host lets Authelia accept an http (non-TLS) redirect URI.
          - 'http://localhost:8080/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
        # Trilium sends credentials via HTTP Basic for non-Google issuers
        # (see resolveClientAuthMethod() in apps/server/src/services/open_id.ts).
        token_endpoint_auth_method: 'client_secret_basic'

        # --- WORKAROUND (issue #6387) ---------------------------------------
