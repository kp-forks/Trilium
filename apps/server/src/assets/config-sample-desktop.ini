# Configuration for the Trilium desktop app.
#
# The desktop app talks to its bundled server in-process, so web-deployment
# options (host, port, CORS, reverse proxy, sessions, OAuth) don't apply and are
# omitted from this file. Network access and scripting are managed through the
# application UI (Settings -> Security), not here.
#
# The fixed local port can be changed with the TRILIUM_PORT environment variable.

[General]
# Instance name can be used to distinguish between different instances using backend api.getInstanceName()
instanceName=

# set to true to disable backups (e.g. because of limited disk space)
noBackup=false

[Network]
# These only take effect once you've enabled network access (Settings -> Security),
# e.g. to sync from another device over an encrypted connection.
# true for TLS/SSL/HTTPS (secure), false for HTTP (insecure).
https=false
# path to certificate (run "bash bin/generate-cert.sh" to generate a self-signed certificate). Relevant only if https=true
certPath=
keyPath=

[Sync]
#syncServerHost=
#syncServerTimeout=
#syncServerProxy=

[Security]
# On desktop these are managed through Settings -> Security; the values below are
# only the startup defaults used until you change them in the UI.
# Enable backend script execution (startup scripts, custom request handlers, event handlers, scheduled scripts, etc.).
backendScriptingEnabled=false
# Enable the SQL console (allows raw SQL execution against the database).
sqlConsoleEnabled=false
