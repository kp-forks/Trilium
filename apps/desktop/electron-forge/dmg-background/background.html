<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Trilium DMG background</title>
<style>
    html, body { margin: 0; padding: 0; }
    /* 640 x 400 pt window. Real app icon + /Applications alias are placed on top by
       Finder (via `contents` coords in forge.config), centered on the two platforms;
       Finder also draws their text labels, so none are baked in here. Brand language
       reused from the installer splash: the same dark surface, plus a soft glow and a
       drag arrow tinted from the trillium's leaves. ?variant=nightly swaps to purple. */
    .bg {
        position: relative;
        width: 640px;
        height: 400px;
        overflow: hidden;
        font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        color: #f2f3f5;
    }
    .variant-stable {
        background:
            radial-gradient(120px 90px at 34% 30%, rgba(228, 123, 25, 0.16), transparent 70%),
            radial-gradient(140px 100px at 63% 24%, rgba(79, 165, 43, 0.16), transparent 70%),
            radial-gradient(120px 100px at 50% 46%, rgba(227, 63, 59, 0.13), transparent 70%),
            linear-gradient(180deg, #2b3038 0%, #23262b 100%);
    }
    .variant-nightly {
        background:
            radial-gradient(120px 90px at 34% 30%, rgba(177, 138, 214, 0.16), transparent 70%),
            radial-gradient(140px 100px at 63% 24%, rgba(129, 70, 184, 0.18), transparent 70%),
            radial-gradient(120px 100px at 50% 46%, rgba(110, 46, 168, 0.15), transparent 70%),
            linear-gradient(180deg, #2b3038 0%, #23262b 100%);
    }

    .brand {
        position: absolute;
        top: 40px; left: 0; right: 0;
        display: flex; align-items: center; justify-content: center; gap: 13px;
    }
    .brand svg { width: 44px; height: 44px; display: block; }
    .brand .word { font-size: 25px; font-weight: 600; letter-spacing: 0.01em; }
    .brand .word .notes { font-weight: 350; color: #9aa0a8; }
    .brand .badge {
        display: none;
        font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
        color: #ffffff; background: #8146b8; border-radius: 3px; padding: 2px 7px 3px;
        transform: translateY(-2px);
    }
    .variant-nightly .badge { display: inline-block; }

    /* Drop platforms — subtle pedestals under where the real icons land. */
    .platform {
        position: absolute;
        width: 150px; height: 150px;
        top: 140px;
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.035);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .platform.app { left: 105px; }
    .platform.apps { left: 385px; }

    .arrow { position: absolute; top: 192px; left: 274px; width: 92px; height: 46px; }
    .variant-stable .s0 { stop-color: #e47b19; }
    .variant-stable .s1 { stop-color: #4fa52b; }
    .variant-stable .s2 { stop-color: #e33f3b; }
    .variant-nightly .s0 { stop-color: #b18ad6; }
    .variant-nightly .s1 { stop-color: #8146b8; }
    .variant-nightly .s2 { stop-color: #6e2ea8; }

    /* No instructional text: the DMG ships one baked image for every locale, and the
       arrow plus Finder's own icon labels already convey "drag to Applications". */

    /* Leaf fills — stable are the exact nine from icon-color.svg; nightly are purple ramps. */
    .variant-stable .g1 { fill: #95c980; } .variant-stable .g2 { fill: #72b755; } .variant-stable .g3 { fill: #4fa52b; }
    .variant-stable .r1 { fill: #ee8c89; } .variant-stable .r2 { fill: #e96562; } .variant-stable .r3 { fill: #e33f3b; }
    .variant-stable .o1 { fill: #efb075; } .variant-stable .o2 { fill: #e99547; } .variant-stable .o3 { fill: #e47b19; }
    .variant-nightly .g1 { fill: #b18ad6; } .variant-nightly .g2 { fill: #9159c4; } .variant-nightly .g3 { fill: #6e2ea8; }
    .variant-nightly .r1 { fill: #cdb2e4; } .variant-nightly .r2 { fill: #b08fd6; } .variant-nightly .r3 { fill: #9668c2; }
    .variant-nightly .o1 { fill: #c09fe0; } .variant-nightly .o2 { fill: #a276cf; } .variant-nightly .o3 { fill: #8146b8; }
</style>
</head>
<body>
<div class="bg" id="bg">

            <path class="r2" d="m110.4 188.9c-3.4-19.8 6.9-40.5 16.6-52.9l4.5 13.4 15.9 47-12.8-47.6-3.6-13.2c13.3 5.2 29.9 15 38.1 30.4 0.4 2.4 0.6 5 0.7 7.7 0.9 23.1-7.1 54.9-15.9 65.7-12-4.3-29.3-24-39.7-42.8-1.4-2.6-2.7-5.2-3.8-7.7z"/>
            <path class="r3" d="m114.2 196.5c-0.7-18 8.6-35.9 17.3-47.1l15.9 47-12.8-47.6c11.6 4.4 26.1 12.4 35.2 24.8 0.9 23.1-7.1 54.9-15.9 65.7-12-4.3-29.3-24-39.7-42.8z"/>
        </svg>
        <span class="word">Trilium <span class="notes">Notes</span><span class="badge">NIGHTLY</span></span>
    </div>

    <div class="platform app"></div>
    <div class="platform apps"></div>

    <svg class="arrow" viewBox="0 0 92 46" aria-hidden="true">
        <defs>
            <linearGradient id="tri" x1="0" y1="0" x2="1" y2="0">
                <stop class="s0" offset="0"/>
                <stop class="s1" offset="0.5"/>
                <stop class="s2" offset="1"/>
            </linearGradient>
        </defs>
        <path d="M6 23 H74 M56 7 L80 23 L56 39" fill="none" stroke="url(#tri)"
              stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>
<script>
    const params = new URLSearchParams(location.search);
    document.getElementById("bg").classList.add(params.get("variant") === "nightly" ? "variant-nightly" : "variant-stable");
</script>
</body>
</html>
