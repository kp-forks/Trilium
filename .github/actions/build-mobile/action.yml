inputs:
  upload-artifact:
    description: "Whether to upload the APK as a workflow artifact"
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: "pnpm"

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Update build info
      shell: bash
      run: pnpm run chore:update-build-info

    - name: Build standalone (webDir for Capacitor)
      shell: bash
      run: pnpm --filter @triliumnext/mobile build

    - name: Sync Capacitor Android project
      shell: bash
      run: pnpm --filter @triliumnext/mobile exec cap sync android

    - name: Assemble debug APK
      shell: bash
      working-directory: apps/mobile/android
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: trilium-mobile-debug-apk
        path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
        retention-days: 14
        archive: false
